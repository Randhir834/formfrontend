<!DOCTYPE html>
<html>
<head>
    <title>API Connection Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        #result {
            background: #f5f5f5;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Backend API Connection Test</h1>
    <p>Backend URL: <strong>https://formbackend-1-v0n3.onrender.com</strong></p>
    
    <button onclick="testHealth()">Test Health Endpoint</button>
    <button onclick="testLogin()">Test Login Endpoint</button>
    
    <div id="result"></div>

    <script>
        const BACKEND_URL = 'https://formbackend-1-v0n3.onrender.com';
        
        async function testHealth() {
            const result = document.getElementById('result');
            result.innerHTML = 'Testing health endpoint...';
            
            try {
                const response = await fetch(`${BACKEND_URL}/health`);
                const data = await response.json();
                result.className = 'success';
                result.innerHTML = `✅ SUCCESS!\n\nStatus: ${response.status}\nResponse: ${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                result.className = 'error';
                result.innerHTML = `❌ ERROR!\n\n${error.message}`;
            }
        }
        
        async function testLogin() {
            const result = document.getElementById('result');
            result.innerHTML = 'Testing login endpoint...';
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'test@test.com',
                        password: 'test123'
                    })
                });
                const data = await response.json();
                
                if (response.ok) {
                    result.className = 'success';
                } else {
                    result.className = 'error';
                }
                
                result.innerHTML = `Status: ${response.status}\nResponse: ${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                result.className = 'error';
                result.innerHTML = `❌ ERROR!\n\n${error.message}`;
            }
        }
    </script>
</body>
</html>
